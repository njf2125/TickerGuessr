name: Daily Game Generator

on:
  schedule:
    - cron: '0 6 * * *'  # 6:00 UTC = 2:00am ET, before US market open
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Defaults to tomorrow.'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate game file
        # Pass the dispatch input via env (never interpolated into the shell line)
        # to avoid GitHub Actions script injection. Empty -> script defaults to tomorrow.
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.date || '' }}
        run: npx tsx scripts/fetch-game-data.ts "$TARGET_DATE"

      # main is protected (required "check" status + no direct pushes), so the bot
      # commits to its own branch and opens a PR instead of pushing to main directly.
      # Checkout uses a PAT (not GITHUB_TOKEN) so the PR is attributed to a real user —
      # GITHUB_TOKEN-authored PRs don't trigger other workflows (incl. the required CI check),
      # and the eventual merge (also via the PAT) still fires deploy.yml's push trigger.
      - name: Commit game file to automation branch
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: generate daily game (remember to fill in triviaHints)'
          file_pattern: 'public/games/*.json'
          branch: automation/daily-game-${{ github.run_id }}
          create_branch: true

      - name: Open PR and enable auto-merge
        if: steps.commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr create \
            --title "chore: generate daily game" \
            --body "Automated daily puzzle generation." \
            --base main \
            --head "automation/daily-game-${{ github.run_id }}"
          gh pr merge --auto --squash "automation/daily-game-${{ github.run_id }}"

  refresh-pool:
    needs: generate
    if: ${{ always() && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Refresh pool + autocomplete (first of month only)
        run: |
          if [ "$(date -u +%d)" = "01" ]; then
            npx tsx scripts/build-company-list.ts
            npx tsx scripts/build-puzzle-pool.ts
          else
            echo "Not the 1st — skipping pool refresh."
          fi

      - name: Verify winnable pool
        run: npx vitest run src/data/puzzle-pool.test.ts

      - name: Commit pool refresh to automation branch
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: monthly refresh of company list + puzzle pool'
          file_pattern: 'src/data/companies.ts src/data/puzzle-pool.ts'
          branch: automation/pool-refresh-${{ github.run_id }}
          create_branch: true

      - name: Open PR and enable auto-merge
        if: steps.commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr create \
            --title "chore: monthly refresh of company list + puzzle pool" \
            --body "Automated monthly pool refresh." \
            --base main \
            --head "automation/pool-refresh-${{ github.run_id }}"
          gh pr merge --auto --squash "automation/pool-refresh-${{ github.run_id }}"
